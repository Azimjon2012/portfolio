<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azimjon Portfolio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
}

header {
  padding: 40px;
  text-align: center;
}

header h1 {
  font-size: 40px;
  background: linear-gradient(90deg, #6366f1, #22d3ee);
  -webkit-background-clip: text;
  color: transparent;
}

.box {
  text-align: center;
  margin: 20px;
}

input {
  padding: 12px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  width: 200px;
  background: #1e293b;
  color: white;
}

button {
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #6366f1, #22d3ee);
  color: white;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<header>
  <h1>🚀 My Portfolio</h1>
</header>

<div class="box">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="box">
  <input id="title" placeholder="Project title">
  <input id="desc" placeholder="Description">
  <button onclick="addProject()">Add Project</button>
</div>

<div class="container" id="projects"></div>

<script>

// ✅ ВАЖНО: правильный backend URL
const API = "https://portfolio-beckend-6a0r.onrender.com";

let token = "";

// LOGIN
async function login() {
  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        username: username.value,
        password: password.value
      })
    });

    const data = await res.json();
    console.log("LOGIN RESPONSE:", data);

    if (data.token) {
      token = data.token;
      alert("✅ Logged in");
    } else {
      alert("❌ Login failed");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Server error");
  }
}

// ADD PROJECT
async function addProject() {
  if (!token) {
    alert("Login first!");
    return;
  }

  try {
    const res = await fetch(API + "/projects", {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": token
      },
      body: JSON.stringify({
        title: title.value,
        desc: desc.value
      })
    });

    const data = await res.json();
    console.log("ADD PROJECT:", data);

    loadProjects();

  } catch (err) {
    console.error(err);
  }
}

// LOAD PROJECTS
async function loadProjects() {
  try {
    const res = await fetch(API + "/projects");
    const data = await res.json();

    projects.innerHTML = data.map(p => `
      <div class="card">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
  }
}

loadProjects();

</script>

</body>
</html>
